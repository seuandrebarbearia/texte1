<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Marinho Burguer</title>

<link rel="stylesheet" href="./output.css">
</head>

<body class="p-5 bg-gray-100 font-sans">

    <h1 class="text-2xl font-bold mb-4 text-gray-800">Painel Administrativo</h1>

    <!-- BOTÕES -->
    <div class="flex gap-3 mb-6">
        <button onclick="voltarSite()" class="bg-blue-600 text-white px-4 py-2 rounded">
            Voltar ao Site
        </button>

        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">
            Sair
        </button>
    </div>

    <!-- FORM -->
    <div class="bg-white p-6 rounded-lg shadow-md mb-8 max-w-2xl">

        <h2 class="font-bold mb-4 text-gray-700">Cadastrar Produto</h2>

        <input id="name" placeholder="Nome"
            class="border p-2 w-full mb-3 rounded">

        <input id="price" type="number" step="0.01" placeholder="Preço"
            class="border p-2 w-full mb-3 rounded">

        <select id="category" title="Categoria do produto" class="border p-2 w-full mb-3 rounded">
            <option value="lanche">🍔 Lanche</option>
            <option value="bebida">🥤 Bebida</option>
        </select>

        <input id="img" type="file" accept="image/*"
            class="mb-4 w-full">

        <button id="btn-add" onclick="addProduct()"
            class="bg-green-600 text-white w-full py-2 rounded">
            Adicionar Produto
        </button>

    </div>

    <h2 class="text-xl font-bold mb-4">Produtos</h2>
    <div id="product-list" class="max-w-2xl"></div>

    <script>
        let products = JSON.parse(localStorage.getItem("products")) || []

        function saveProducts() {
            localStorage.setItem("products", JSON.stringify(products))
        }

        function voltarSite() {
            window.location.href = "index.html"
        }

        function logout() {
            if (confirm("Deseja sair?")) {
                window.location.href = "index.html"
            }
        }

        // BASE64
        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader()
                reader.readAsDataURL(file)
                reader.onload = () => resolve(reader.result)
                reader.onerror = error => reject(error)
            })
        }

        // ADICIONAR
        async function addProduct() {
            const nameInput = document.getElementById("name")
            const priceInput = document.getElementById("price")
            const categoryInput = document.getElementById("category")
            const fileInput = document.getElementById("img")
            const btn = document.getElementById("btn-add")

            const name = nameInput.value.trim()
            const price = parseFloat(priceInput.value)
            const category = categoryInput.value
            const file = fileInput.files[0]

            if (!name || isNaN(price) || !file) {
                alert("Preencha tudo!")
                return
            }

            btn.innerText = "Salvando..."
            btn.disabled = true

            try {
                const img = await toBase64(file)

                products.push({ name, price, img, category })

                saveProducts()
                render()

                // LIMPAR CAMPOS
                nameInput.value = ""
                priceInput.value = ""
                fileInput.value = ""
                categoryInput.value = "lanche"

            } catch {
                alert("Erro ao carregar imagem")
            }

            btn.innerText = "Adicionar Produto"
            btn.disabled = false
        }

        // 🔥 DELETAR PRODUTO (FALTAVA ISSO!)
        function removeProduct(index) {
            const confirmar = confirm("Deseja excluir este produto?")

            if (!confirmar) return

            products.splice(index, 1)

            saveProducts()
            render()
        }

        // EDITAR PREÇO
        function updatePrice(index) {
            const atual = products[index].price

            const novo = prompt("Novo preço:", atual)

            if (novo !== null) {
                const valor = parseFloat(novo.replace(",", "."))

                if (!isNaN(valor)) {
                    products[index].price = valor
                    saveProducts()
                    render()
                } else {
                    alert("Preço inválido")
                }
            }
        }

        // RENDER
        function render() {
            const list = document.getElementById("product-list")
            list.innerHTML = ""

            const categorias = [
                { id: "lanche", titulo: "🍔 Lanches" },
                { id: "bebida", titulo: "🥤 Bebidas" }
            ]

            categorias.forEach(cat => {

                const itens = products.filter(p => p.category === cat.id)

                if (itens.length > 0) {

                    const section = document.createElement("div")

                    section.innerHTML = `<h3 class="font-bold mt-4 mb-2">${cat.titulo}</h3>`

                    itens.forEach(p => {
                        const i = products.indexOf(p)

                        const div = document.createElement("div")

                        div.className = "flex justify-between items-center bg-white p-3 rounded mb-2"

                        div.innerHTML = `
                            <div class="flex gap-3 items-center">
                                <img src="${p.img}" class="w-12 h-12 rounded">
                                <div>
                                    <p class="font-bold">${p.name}</p>
                                    <p class="text-green-600">R$ ${p.price.toFixed(2)}</p>
                                </div>
                            </div>

                            <div class="flex gap-2">
                                <button onclick="updatePrice(${i})"
                                    class="bg-yellow-400 px-2 py-1 rounded text-white">
                                    Editar
                                </button>

                                <button onclick="removeProduct(${i})"
                                    class="bg-red-500 px-2 py-1 rounded text-white">
                                    Excluir
                                </button>
                            </div>
                        `
                        section.appendChild(div)
                    })

                    list.appendChild(section)
                }
            })

            if (products.length === 0) {
                list.innerHTML = "<p>Nenhum produto cadastrado</p>"
            }
        }

        render()
    </script>

</body>
</html>
