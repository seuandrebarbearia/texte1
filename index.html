<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- FONTE CORRIGIDA -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <!-- ICONES -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Marinho Burguer</title>
</head>

<body class="font-[Poppins] bg-gray-100 pb-20">

    <!-- HEADER -->
    <header
        class="w-full h-[400px] bg-zinc-900 bg-home bg-cover bg-center flex flex-col items-center justify-center text-white">
        <img src="./assets/burg1.png" id="logo" class="w-28 h-28 rounded-full mb-3" alt="Logo Marinho Burguer">
        <h1 class="text-3xl font-bold">Marinho Burguer</h1>

        <div class="bg-green-500 px-4 py-1 rounded-lg mt-2">
            <span class="text-sm font-medium">Seg a Dom - 08:00 às 22:00</span>
        </div>
    </header>
    <!-- SEÇÃO DE PRODUTOS  nemu-->
    <h2 class="text-2xl text-center font-bold mt-8 mb-4 text-gray-800">🍔 Lanches</h2>
    <main id="menu-lanches" class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4 max-w-5xl mx-auto mb-10"></main>

    <h2 class="text-2xl text-center font-bold mt-4 mb-4 text-gray-800">🥤 Bebidas</h2>
    <main id="menu-bebidas" class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4 max-w-5xl mx-auto mb-10"></main>

    <!-- MODAL CARRINHO -->
    <div id="cart-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[60] p-4">

        <div class="bg-white w-full max-w-[500px] rounded-lg p-5 flex flex-col max-h-[90vh]">

            <h2 class="text-xl font-bold text-center mb-4 border-b pb-2">
                Meu Carrinho
            </h2>

            <div id="cart-items" class="flex-1 overflow-y-auto mb-4 pr-2"></div>

            <!-- ENTREGA -->
            <div class="border-t pt-3 space-y-3">

                <p class="font-bold">Como deseja receber?</p>

                <div class="flex gap-4">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="delivery" value="retirada" checked>
                        Retirada
                    </label>

                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="radio" name="delivery" value="entrega">
                        Entrega (+ R$ 7,00)
                    </label>
                </div>

                <!-- ENDEREÇO -->
                <div class="space-y-2 mt-2">

                    <input id="street" placeholder="Rua" class="w-full border p-2 rounded text-sm">

                    <div class="flex gap-2">
                        <input id="number" placeholder="Nº" class="w-20 border p-2 rounded text-sm">

                        <input id="neighborhood" placeholder="Bairro" class="flex-1 border p-2 rounded text-sm">
                    </div>

                    <input id="complement" placeholder="Complemento" class="w-full border p-2 rounded text-sm">

                    <p id="address-warn" class="text-red-500 text-xs hidden">
                        Preencha o endereço!
                    </p>

                </div>
            </div>

            <!-- TOTAL -->
            <div class="flex justify-between items-center mt-4 border-t pt-4">

                <p class="font-bold text-lg">
                    Total:
                    <span id="cart-total" class="text-green-600">
                        R$ 0,00
                    </span>
                </p>

                <div class="flex gap-2">
                    <button id="close-modal-btn" class="px-2 text-gray-600">Fechar 
                    </button>
                    

                    <button id="checkout-btn" class="bg-green-600 text-white px-5 py-2 rounded-md font-bold">
                        Finalizar Pedido
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- BOTÃO CARRINHO -->
    <footer class="fixed bottom-0 w-full bg-red-600 flex justify-center py-4 z-40">

        <button id="cart-btn" class="text-white font-bold flex items-center gap-3">

            <span id="cart-count" class="bg-white text-red-600 px-2 rounded-full text-sm">
                0
            </span>

            Ver carrinho

            <i class="fa fa-cart-plus"></i>
        </button>
    </footer>

    <!-- MODAL PRODUTO -->
    <div id="product-modal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[70]">

        <div class="bg-white p-5 rounded-lg w-full max-w-[400px]">

            <h2 id="modal-product-name" class="text-xl font-bold mb-3"></h2>

            <textarea id="modal-observation" class="w-full border p-2 rounded mb-3"
                placeholder="Observação..."></textarea>

            <div class="flex justify-end gap-2">
                <button id="close-product-modal">Cancelar</button>

                <button id="add-product-confirm" class="bg-green-600 text-white px-4 py-1 rounded">
                    Adicionar
                </button>
            </div>
        </div>
    </div>

    <!-- SCRIPT PRODUTOS -->
    <script>
        function renderProducts() {
            const menuLanches = document.getElementById("menu-lanches")
            const menuBebidas = document.getElementById("menu-bebidas")

            let products = JSON.parse(localStorage.getItem("products")) || []

            // fallback (caso não tenha nada salvo)
            if (products.length === 0) {
                products = [
                    { name: "Smash Burger", price: 18.9, img: "./assets/burg2.png", category: "lanche" },
                    { name: "Coca Cola", price: 6.0, img: "./assets/coca.png", category: "bebida" }
                ]
            }

            menuLanches.innerHTML = ""
            menuBebidas.innerHTML = ""

            products.forEach(product => {
                const item = document.createElement("div")

                item.className = "flex gap-4 bg-white p-4 rounded-2xl shadow-sm border hover:border-red-300 transition"

                item.innerHTML = `
            <img src="${product.img}" class="w-28 h-28 rounded-xl object-cover">

            <div class="flex flex-col justify-between w-full">
                <div>
                    <p class="font-bold text-gray-800 text-lg">${product.name}</p>
                </div>

                <div class="flex justify-between items-center mt-3">
                    <p class="font-bold text-lg text-gray-900">R$ ${product.price.toFixed(2)}</p>

                    <button class="add-to-cart-btn bg-gray-900 text-white p-2 rounded-lg hover:bg-red-600 transition"
                        data-name="${product.name}" data-price="${product.price}">
                        🛒
                    </button>
                </div>
            </div>
        `

                // 🔥 AQUI A MÁGICA
                if (product.category === "lanche") {
                    menuLanches.appendChild(item)
                } else if (product.category === "bebida") {
                    menuBebidas.appendChild(item)
                }
            })
        }

        renderProducts()
    </script>


    <script src="script.js"></script>

</body>

</html>
